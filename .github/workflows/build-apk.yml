name: Build SBuster APKon:  push:    branches: [ main, master ]  pull_request:    branches: [ main, master ]  workflow_dispatch:jobs:  build:    runs-on: ubuntu-latest    steps:    - name: Checkout code      uses: actions/checkout@v3    - name: Set up JDK 17      uses: actions/setup-java@v3      with:        java-version: '17'        distribution: 'temurin'        cache: gradle    - name: Setup Android SDK      uses: android-actions/setup-android@v2      with:        api-levels: 34        build-tools: 33.0.1    - name: Accept Android licenses      run: |        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true    - name: Make gradlew executable      run: chmod +x ./gradlew    - name: Build Debug APK      run: ./gradlew assembleDebug    - name: Upload Debug APK      uses: actions/upload-artifact@v3      with:        name: sbuster-debug        path: app/build/outputs/apk/debug/app-debug.apk
